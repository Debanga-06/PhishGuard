services:
  - type: web
    name: phishguard
    runtime: python
    buildCommand: pip install -r requirements.txt && python train.py
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PHISHTANK_API_KEY
        sync: false        # you paste this manually in Render dashboard
      - key: GOOGLE_SAFE_BROWSING_KEY
        sync: false        # you paste this manually in Render dashboard